<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Успешный вход</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; max-width: 720px; margin: 0 auto; }
    .card { background:#f5f5f5; padding:16px; border-radius:12px; }
    code { display:block; padding:12px; background:#fff; border-radius:10px; overflow:auto; }
    button, a {
      display:inline-block; margin:8px 8px 0 0; padding:10px 14px; border-radius:10px;
      border:1px solid #ddd; background:#fff; cursor:pointer; text-decoration:none; color:#111;
    }
    .ok { color:#0a7a2d; font-weight:700; }
  </style>
</head>
<body>
  <h2 class="ok">✅ Успешный вход через Telegram</h2>

  <div class="card">
    <p><b>Вы вошли как:</b> {{ display_name }}</p>

    <p><b>Ваш API key:</b></p>
    <code id="key">{{ api_key }}</code>

    <button onclick="copyKey()">📋 Скопировать</button>
    <a href="/finance/app/">➡️ Перейти в кабинет</a>
  </div>

  <script>
    const apiKey = "{{ api_key }}";
    localStorage.setItem("api_key", apiKey);

    function copyKey() {
      navigator.clipboard.writeText(apiKey)
        .then(() => alert("Ключ скопирован ✅"))
        .catch(() => alert("Не удалось скопировать — скопируй вручную."));
    }
  </script>
</body>
</html>
