<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Finance App</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 24px;">
  <h2>Finance Web</h2>

  <button id="btnMe">Загрузить /api/me</button>
  <button id="btnTx">Загрузить /api/transactions</button>
  <button id="btnLogout">Выйти</button>

  <pre id="out" style="background:#f5f5f5;padding:12px;border-radius:8px;white-space:pre-wrap;"></pre>

  <script>
    const out = document.getElementById("out");
    const apiKey = localStorage.getItem("api_key");

    if (!apiKey) {
      out.textContent = "Нет api_key. Сначала войди через Telegram.\nПерекидываю на /finance/login/";
      setTimeout(() => window.location.href = "/finance/login/", 1200);
    }

    async function callApi(path) {
      const url = path + (path.includes("?") ? "&" : "?") + "api_key=" + encodeURIComponent(apiKey);
      const resp = await fetch(url);
      const data = await resp.json();
      out.textContent = `GET ${url}\n\n` + JSON.stringify(data, null, 2);
    }

    document.getElementById("btnMe").onclick = () => callApi("/api/me/");
    document.getElementById("btnTx").onclick = () => callApi("/api/transactions/");
    document.getElementById("btnLogout").onclick = () => {
      localStorage.removeItem("api_key");
      window.location.href = "/finance/login/";
    };
  </script>
</body>
</html>
