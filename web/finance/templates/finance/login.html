<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Вход по коду</title>
</head>

<body style="font-family: Arial, sans-serif; padding: 24px; max-width: 520px;">
  <h2>Вход по коду из Telegram-бота</h2>

  <ol style="line-height: 1.5;">
    <li>Открой бота</li>
    <li>Нажми <b>«🔑 Войти на сайт»</b></li>
    <li>Введи код ниже (действует около 2 минут)</li>
  </ol>

  <div style="margin: 16px 0;">
    <input
      id="code"
      placeholder="Код (например 12345678)"
      inputmode="numeric"
      autocomplete="one-time-code"
      style="font-size:18px;padding:10px;width:240px;border:1px solid #ddd;border-radius:10px;"
    />
    <button
      id="btn"
      style="font-size:18px;padding:10px 16px;margin-left:8px;border:0;border-radius:10px;cursor:pointer;"
    >
      Войти
    </button>
  </div>

  <div style="display:flex; gap:8px; align-items:center;">
    <button
      id="pasteBtn"
      style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;"
    >
      Вставить из буфера
    </button>

    <button
      id="clearBtn"
      style="font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:10px;cursor:pointer;background:#fff;"
    >
      Очистить
    </button>
  </div>

  <pre id="out" style="background:#f5f5f5;padding:12px;border-radius:12px;margin-top:16px;white-space:pre-wrap;"></pre>

  <script>
    const out = document.getElementById("out");
    const btn = document.getElementById("btn");
    const pasteBtn = document.getElementById("pasteBtn");
    const clearBtn = document.getElementById("clearBtn");
    const codeEl = document.getElementById("code");

    function setOut(msg) {
      out.textContent = msg;
    }

    function normalizeCode(v) {
      return (v || "").trim().replace(/\s+/g, "");
    }

    async function doLogin() {
      const code = normalizeCode(codeEl.value);

      if (!code) {
        setOut("❌ Введите код.");
        return;
      }

      setOut("⏳ Проверяю код...");

      try {
        const resp = await fetch("/api/auth/code/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ code }),
        });

        const raw = await resp.text();

        let data = null;
        try { data = JSON.parse(raw); } catch {}

        if (resp.ok && data && data.api_key) {
          localStorage.setItem("api_key", data.api_key);
          setOut("✅ Успешно! api_key сохранён. Перехожу в приложение...");
          window.location.href = "/finance/app/";
          return;
        }

        const detail = (data && data.detail) ? data.detail : raw;
        setOut("❌ Ошибка: " + detail);

      } catch (e) {
        setOut("🔥 Ошибка JS/сети:\n" + (e?.stack || e));
      }
    }

    btn.addEventListener("click", doLogin);

    codeEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    pasteBtn.addEventListener("click", async () => {
      try {
        const txt = await navigator.clipboard.readText();
        codeEl.value = normalizeCode(txt);
        setOut("📋 Вставлено из буфера. Нажми «Войти».");
      } catch (e) {
        setOut("❌ Не удалось прочитать буфер обмена (браузер запретил). Вставь вручную.");
      }
    });

    clearBtn.addEventListener("click", () => {
      codeEl.value = "";
      setOut("");
      codeEl.focus();
    });

    // чуть удобнее
    codeEl.focus();
  </script>
</body>
</html>
